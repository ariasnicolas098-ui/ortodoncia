<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultorio Dental - Búsqueda Inteligente</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
    }

    .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
        position: relative;
    }

    .admin-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255,255,255,0.2);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s;
        border: 2px solid rgba(255,255,255,0.3);
    }

    .admin-btn:hover {
        background: white;
        color: #667eea;
        transform: translateY(-2px);
    }

    .header h1 { font-size: 2.5em; margin-bottom: 10px; }
    .header p { opacity: 0.9; font-size: 1.1em; }

    .search-section {
        padding: 40px;
        background: #f8f9fa;
    }

    .search-box {
        display: flex;
        gap: 15px;
        max-width: 700px;
        margin: 0 auto;
        flex-wrap: wrap;
    }

    .input-wrapper {
        flex: 1;
        position: relative;
        min-width: 250px;
    }

    #searchInput {
        width: 100%;
        padding: 18px 25px;
        font-size: 18px;
        border: 2px solid #e0e0e0;
        border-radius: 50px;
        outline: none;
        transition: all 0.3s;
    }

    #searchInput:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .mic-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: #f44336;
        color: white;
        font-size: 24px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
    }

    .mic-btn:hover:not(:disabled) {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(244, 67, 54, 0.6);
    }

    .search-btn {
        padding: 18px 35px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
    }

    .status {
        text-align: center;
        margin-top: 15px;
        color: #666;
        font-size: 14px;
        min-height: 20px;
    }

    .results-section {
        padding: 40px;
        min-height: 400px;
    }

    .patient-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        border-left: 5px solid #667eea;
    }

    .loading {
        text-align: center;
        padding: 50px;
    }

    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://ortodoncia.onrender.com/admin" class="admin-btn" target="_blank">⚙️ Panel Admin</a>
            <h1>🏥 Consultorio Dental</h1>
            <p>Búsqueda de pacientes por voz o texto</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <div class="input-wrapper">
                    <input type="text" id="searchInput" placeholder="Diga o escriba el nombre del paciente..." autocomplete="off">
                </div>
                <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Buscar por voz">🎤</button>
                <button class="search-btn" onclick="buscarPaciente()">Buscar</button>
            </div>
            
            <div class="status" id="status"></div>
        </div>

        <div class="results-section" id="resultados">
            <div class="no-results">
                🔍 Ingrese un nombre para buscar el historial del paciente
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://ortodoncia.onrender.com";

        async function buscarPaciente(nombre = null) {
            const query = nombre || document.getElementById('searchInput').value.trim();
            
            if (!query) return;

            const resultados = document.getElementById('resultados');
            resultados.innerHTML = `<div class="loading"><div class="spinner"></div><p>Buscando paciente...</p></div>`;

            try {
                const response = await fetch(`${API_URL}/api/buscar?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                mostrarResultados(data, query);
            } catch (error) {
                resultados.innerHTML = `<div class="no-results" style="color: red;">❌ Error de conexión. Intenta más tarde.</div>`;
            }
        }

        function mostrarResultados(data, query) {
            // (Mantengo tu función original de mostrar resultados)
            if (data.length === 0) {
                document.getElementById('resultados').innerHTML = `
                    <div class="no-results">
                        😕 No se encontraron pacientes con "${query}"
                    </div>`;
                return;
            }

            let html = '';
            data.forEach(paciente => {
                html += `
                    <div class="patient-card">
                        <h2>${paciente.nombre_completo}</h2>
                        <p><strong>DNI:</strong> ${paciente.dni || 'No registrado'}</p>
                        <p><strong>Teléfono:</strong> ${paciente.telefono || 'No registrado'}</p>
                        <!-- Puedes agregar más campos si quieres -->
                    </div>`;
            });

            document.getElementById('resultados').innerHTML = html;
        }

        // Búsqueda con Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarPaciente();
        });
    </script>
</body>
</html>
